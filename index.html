<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>RAGAM4D FREECHIP</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <style>
 import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap');

/* ===========================
   ROOT
=========================== */

:root{
  --bg:#05010a;
  --bg2:#12041f;

  --purple:#8a2be2;
  --purple2:#c77dff;

  --blue:#00a8ff;
  --blue2:#4cc9f0;

  --gold:#ffb300;
  --orange:#ff7b00;

  --white:#f5f7ff;

  --glass:
    rgba(18,4,31,.55);

  --border:
    rgba(255,255,255,.12);

  --shadowPurple:
    0 0 25px rgba(138,43,226,.45);

  --shadowBlue:
    0 0 25px rgba(0,168,255,.45);

  --shadowGold:
    0 0 25px rgba(255,179,0,.45);

  --radius:35px;
}

/* ===========================
   RESET
=========================== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  overflow-x:hidden;
}

body{
  min-height:100vh;
  color:var(--white);
  font-family:'Rajdhani',sans-serif;

  background:
  radial-gradient(
    circle at top,
    rgba(138,43,226,.35),
    transparent 40%
  ),

  radial-gradient(
    circle at bottom,
    rgba(0,168,255,.25),
    transparent 45%
  ),

  linear-gradient(
    180deg,
    #05010a,
    #12041f
  );

  position:relative;
}

/* ===========================
   STARS
=========================== */

.stars,
.stars2,
.stars3{
  position:fixed;
  inset:0;
  pointer-events:none;
}

.stars{
  background:
  radial-gradient(
    white 1px,
    transparent 1px
  );

  background-size:
  80px 80px;

  opacity:.25;
}

.stars2{
  background:
  radial-gradient(
    white 1.5px,
    transparent 1.5px
  );

  background-size:
  130px 130px;

  opacity:.15;
}

.stars3{
  background:
  radial-gradient(
    white 2px,
    transparent 2px
  );

  background-size:
  200px 200px;

  opacity:.08;
}

/* ===========================
   CONTAINER
=========================== */

.container{
  width:min(95%,1400px);
  margin:auto;
  padding:
  40px 20px
  80px;
  position:relative;
  z-index:5;
}

/* ===========================
   HERO
=========================== */

.hero{
  text-align:center;
  margin-bottom:45px;
}

.logo-title{
  font-family:'Orbitron';
  font-weight:900;

  font-size:
  clamp(
    40px,
    7vw,
    90px
  );

  line-height:1.1;
}

.logo-title span{
  display:block;

  background:
  linear-gradient(
    90deg,
    var(--blue),
    white,
    var(--gold)
  );

  -webkit-background-clip:text;
  -webkit-text-fill-color:
  transparent;

  text-shadow:
  0 0 35px
  rgba(0,168,255,.45);
}

.hero-subtitle{
  margin-top:15px;

  font-size:
  clamp(
    16px,
    2vw,
    24px
  );

  letter-spacing:2px;

  opacity:.9;
}

/* ===========================
   ASTRONAUT
=========================== */

.astronaut-box{
  margin-top:40px;
}

.astronaut{
  width:
  min(
    100%,
    420px
  );

  animation:
  astronautFloat
  5s
  ease-in-out
  infinite;

  filter:
  drop-shadow(
    0 0 20px
    rgba(138,43,226,.7)
  )
  drop-shadow(
    0 0 60px
    rgba(0,168,255,.4)
  );
}

@keyframes astronautFloat{

  0%{
    transform:
    translateY(0);
  }

  50%{
    transform:
    translateY(-15px);
  }

  100%{
    transform:
    translateY(0);
  }
}

/* ===========================
   MULTIPLIER
=========================== */

.multi{
  position:fixed;

  z-index:2;

  padding:
  12px
  20px;

  border-radius:18px;

  background:
  linear-gradient(
    90deg,
    var(--orange),
    var(--gold)
  );

  color:white;

  font-family:
  'Orbitron';

  font-weight:700;

  box-shadow:
  0 0 20px
  rgba(255,179,0,.7);

  animation:
  multiFloat
  4s
  ease-in-out
  infinite;
}

.x50{
  left:5%;
  top:70%;
}

.x100{
  left:12%;
  top:30%;
}

.x250{
  right:12%;
  top:22%;
}

.x500{
  right:6%;
  top:70%;
}

.x1000{
  right:15%;
  top:50%;
}

@keyframes multiFloat{

  0%{
    transform:
    translateY(0);
  }

  50%{
    transform:
    translateY(-12px);
  }

  100%{
    transform:
    translateY(0);
  }
}

/* ===========================
   CONTENT
=========================== */

.content-grid{
  display:grid;
  gap:35px;
}

/* ===========================
   CARD
=========================== */

.card{
  background:
  rgba(18,4,31,.55);

  border:
  1px solid
  rgba(255,255,255,.12);

  backdrop-filter:
  blur(25px);

  border-radius:
  var(--radius);

  padding:
  35px;

  box-shadow:
  0 0 40px
  rgba(138,43,226,.18);
}

.card h3{
  text-align:center;

  font-family:
  'Orbitron';

  font-size:
  22px;

  margin-bottom:
  30px;
}

/* ===========================
   INPUT
=========================== */

.input-row{
  display:flex;
  gap:15px;
}

#userid{
  flex:1;

  height:60px;

  border:none;

  border-radius:
  18px;

  padding:
  0 20px;

  background:
  rgba(255,255,255,.08);

  color:white;

  outline:none;

  font-size:18px;
}

#userid::placeholder{
  color:
  rgba(255,255,255,.4);
}

.clear-btn{
  border:none;

  padding:
  0 25px;

  border-radius:
  18px;

  background:
  linear-gradient(
    90deg,
    var(--purple),
    var(--blue)
  );

  color:white;

  font-weight:700;

  cursor:pointer;
}

/* ===========================
   WHEEL
=========================== */

#wheelBox{
  position:relative;

  width:
  min(
    100%,
    500px
  );

  margin:auto;
}

#wheel{
  width:100%;
  height:auto;

  border-radius:50%;

  box-shadow:
  0 0 40px
  rgba(0,168,255,.4),
  0 0 80px
  rgba(138,43,226,.3);
}

#pointer{
  position:absolute;

  left:50%;
  top:-25px;

  transform:
  translateX(-50%);

  width:0;
  height:0;

  border-left:
  20px solid transparent;

  border-right:
  20px solid transparent;

  border-top:
  40px solid
  var(--gold);

  z-index:10;
}

.spin-btn{
  width:100%;

  height:65px;

  border:none;

  margin-top:35px;

  border-radius:
  18px;

  background:
  linear-gradient(
    90deg,
    var(--orange),
    var(--gold)
  );

  color:white;

  font-family:
  'Orbitron';

  font-size:18px;

  font-weight:700;

  cursor:pointer;

  box-shadow:
  0 0 30px
  rgba(255,179,0,.5);
}

/* ===========================
   POPUP
=========================== */

#popup{
  display:none;

  position:fixed;
  inset:0;

  background:
  rgba(0,0,0,.82);

  justify-content:center;
  align-items:center;

  z-index:999;
}

.popup-box{
  width:
  min(
    90%,
    420px
  );

  background:
  rgba(18,4,31,.9);

  border:
  1px solid
  rgba(255,255,255,.12);

  border-radius:
  30px;

  padding:
  40px;

  text-align:center;

  box-shadow:
  0 0 35px
  rgba(0,168,255,.35),
  0 0 80px
  rgba(138,43,226,.25);
}

.popup-title{
  font-size:26px;
  font-weight:700;
}

.popup-sub{
  margin-top:15px;
  opacity:.8;
}

#resultText{
  font-size:45px;
  font-weight:900;
  margin:25px 0;

  color:
  var(--gold);
}

.claim-btn{
  width:100%;
  height:60px;

  border:none;

  border-radius:
  18px;

  background:
  linear-gradient(
    90deg,
    var(--orange),
    var(--gold)
  );

  color:white;

  font-family:
  'Orbitron';

  font-weight:700;

  cursor:pointer;
}

/* ===========================
   PARTICLE
=========================== */

.particle{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
}

.particle1{
  width:10px;
  height:10px;
  background:#00a8ff;
  left:15%;
  top:60%;
}

.particle2{
  width:15px;
  height:15px;
  background:#8a2be2;
  right:15%;
  top:35%;
}

.particle3{
  width:12px;
  height:12px;
  background:#ffb300;
  left:70%;
  top:75%;
}

.particle4{
  width:8px;
  height:8px;
  background:#ffffff;
  left:50%;
  top:20%;
}

/* ===========================
   RESPONSIVE
=========================== */

@media(min-width:992px){

  .content-grid{
    grid-template-columns:
      400px
      1fr;
    align-items:start;
  }

  .input-card{
    position:sticky;
    top:40px;
  }
}

@media(max-width:768px){

  .multi{
    transform:
    scale(.8);
  }

  .card{
    padding:25px;
  }

  .input-row{
    flex-direction:column;
  }

  .clear-btn{
    height:55px;
  }
}
</style>
  
  
</head>

<body>

  <!-- BACKGROUND STARS -->
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <!-- MULTIPLIER FLOAT -->
  <div class="multi x50">x50</div>
  <div class="multi x100">x100</div>
  <div class="multi x250">x250</div>
  <div class="multi x500">x500</div>
  <div class="multi x1000">x1000</div>

  <main class="container">

    <!-- HERO -->
    <section class="hero">

      <div class="logo-box">

        <h1 class="logo-title">
          <span>RAGAM4D</span>
          <span>FREECHIP</span>
        </h1>

        <p class="hero-subtitle">
          DAPATKAN SALDO GRATISNYA DISINI!
        </p>

      </div>

      <!-- ASTRONAUT -->
      <div class="astronaut-box">

        <!-- GANTI FILE INI DENGAN GAMBAR ASTRONAUT KAMU -->
        <img
src="https://i.ibb.co/Dfcr4YPH/Astronauts-in-colourful-casino-space-adventure.png"
alt="Astronaut"
class="astronaut">

      </div>

    </section>

    <!-- CONTENT -->
    <section class="content-grid">

      <!-- INPUT -->
      <div class="card input-card">

        <h3>
          MASUKKAN ID MEMBER
        </h3>

        <div class="input-row">

          <input
            id="userid"
            type="text"
            placeholder="Contoh: RAGAM01">

          <button
            class="clear-btn"
            id="clearBtn">

            HAPUS

          </button>

        </div>

      </div>

      <!-- WHEEL -->
      <div class="card wheel-card">

        <h3>
          RODA SALDO GRATIS
        </h3>

        <div id="wheelBox">

          <div id="pointer"></div>

          <canvas
            id="wheel"
            width="450"
            height="450">
          </canvas>

        </div>

        <button
          id="spinBtn"
          class="spin-btn">

          PUTAR SEKARANG

        </button>

      </div>

    </section>

  </main>

  <!-- POPUP -->
  <div id="popup">

    <div class="popup-box">

      <div class="popup-title">
        SELAMAT!
      </div>

      <div class="popup-sub">
        KAMU BERHASIL MENDAPATKAN
      </div>

      <div id="resultText">
      </div>

      <button
        id="claimBtn"
        class="claim-btn">

        KLAIM HADIAH

      </button>

    </div>

  </div>

  <!-- PARTICLE -->
  <div class="particle particle1"></div>
  <div class="particle particle2"></div>
  <div class="particle particle3"></div>
  <div class="particle particle4"></div>

  <!-- JS -->
 <script>
 /* ======================================
   ELEMENT
====================================== */

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const spinBtn = document.getElementById("spinBtn");
const clearBtn = document.getElementById("clearBtn");
const userId = document.getElementById("userid");

const popup = document.getElementById("popup");
const resultText = document.getElementById("resultText");
const claimBtn = document.getElementById("claimBtn");

/* ======================================
   SETTING HADIAH
   CUKUP EDIT BAGIAN INI SAJA
====================================== */

const prizes = [
  {
    text: "50.000",
    color: "#00A8FF"
  },
  {
    text: "100.000",
    color: "#8A2BE2"
  },
  {
    text: "250.000",
    color: "#FFB300"
  },
  {
    text: "500.000",
    color: "#FF7B00"
  },
  {
    text: "1.000.000",
    color: "#00A8FF"
  },
  {
    text: "ZONK",
    color: "#232323"
  }
];

/* ======================================
   LINK KLAIM
====================================== */

const CLAIM_URL = "https://ragam4d03.com/";

/* ======================================
   WHEEL
====================================== */

const totalSlice = prizes.length;
const sliceRad = (Math.PI * 2) / totalSlice;

let currentDeg = 0;
let isSpinning = false;

/* ======================================
   DRAW WHEEL
====================================== */

function drawWheel(rotation = 0) {

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  const radius =
    canvas.width / 2 - 10;

  const offset =
    rotation *
    Math.PI /
    180;

  for (
    let i = 0;
    i < totalSlice;
    i++
  ) {

    const start =
      i *
      sliceRad +
      offset;

    const end =
      start +
      sliceRad;

    /* SEGMENT */

    ctx.beginPath();

    ctx.moveTo(
      cx,
      cy
    );

    ctx.arc(
      cx,
      cy,
      radius,
      start,
      end
    );

    ctx.closePath();

    ctx.fillStyle =
      prizes[i].color;

    ctx.fill();

    /* BORDER */

    ctx.lineWidth = 3;
    ctx.strokeStyle =
      "rgba(255,255,255,.15)";

    ctx.stroke();

    /* TEXT */

    ctx.save();

    ctx.translate(
      cx,
      cy
    );

    ctx.rotate(
      start +
      sliceRad / 2
    );

    ctx.fillStyle =
      "#ffffff";

    ctx.font =
      "700 18px Orbitron";

    ctx.textAlign =
      "center";

    ctx.fillText(
      prizes[i].text,
      radius * 0.65,
      6
    );

    ctx.restore();
  }

  /* CENTER */

  ctx.beginPath();

  ctx.arc(
    cx,
    cy,
    35,
    0,
    Math.PI * 2
  );

  ctx.fillStyle =
    "#FFB300";

  ctx.shadowColor =
    "#FFB300";

  ctx.shadowBlur =
    30;

  ctx.fill();

  ctx.shadowBlur = 0;
}

drawWheel();

/* ======================================
   EASING
====================================== */

function easeOut(t) {
  return (
    1 -
    Math.pow(
      1 - t,
      3
    )
  );
}

/* ======================================
   SPIN
====================================== */

function spin() {

  if (isSpinning)
    return;

  const id =
    userId.value.trim();

  if (!id) {

    alert(
      "Masukkan ID Member terlebih dahulu."
    );

    return;
  }

  isSpinning = true;

  spinBtn.disabled = true;

  const winner =
    Math.floor(
      Math.random() *
      totalSlice
    );

  const sliceDeg =
    360 /
    totalSlice;

  const center =
    winner *
    sliceDeg +
    sliceDeg / 2;

  const target =
    (
      270 -
      center +
      360
    ) %
    360;

  const current =
    currentDeg %
    360;

  let move =
    (
      target -
      current +
      360
    ) %
    360;

  if (move < 120) {
    move += 360;
  }

  const finalDeg =
    currentDeg +
    360 * 6 +
    move;

  const duration =
    5000;

  const start =
    performance.now();

  const initial =
    currentDeg;

  function animate(
    now
  ) {

    const elapsed =
      now -
      start;

    const progress =
      Math.min(
        elapsed /
        duration,
        1
      );

    const eased =
      easeOut(
        progress
      );

    currentDeg =
      initial +
      (
        finalDeg -
        initial
      ) *
      eased;

    drawWheel(
      currentDeg
    );

    if (
      progress < 1
    ) {

      requestAnimationFrame(
        animate
      );

    } else {

      showResult(
        winner
      );
    }
  }

  requestAnimationFrame(
    animate
  );
}

/* ======================================
   RESULT
====================================== */

function showResult(
  index
) {

  resultText.innerText =
    prizes[index].text;

  popup.style.display =
    "flex";

  isSpinning = false;

  spinBtn.disabled =
    false;
}

/* ======================================
   BUTTON
====================================== */

spinBtn.addEventListener(
  "click",
  spin
);

clearBtn.addEventListener(
  "click",
  () => {
    userId.value = "";
    userId.focus();
  }
);

claimBtn.addEventListener(
  "click",
  () => {

    window.location.href =
      CLAIM_URL;
  }
);

/* ======================================
   CLOSE POPUP
====================================== */

popup.addEventListener(
  "click",
  (e) => {

    if (
      e.target === popup
    ) {

      popup.style.display =
        "none";
    }
  }
);
</script>

</body>
</html>
