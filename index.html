

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAGAM4D Premium Wheel</title>
<style>
:root{
--gold:#ffd700;
--cyan:#00d9ff;
--purple:#8b2cff;
--orange:#ff8c00;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
background:url('https://i.ibb.co/TqHJHwMt/0b2c821e-36bf-41ad-8ed7-adc500d06a72.png') center/cover no-repeat;
}
body:before{
content:'';position:fixed;inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(5px);
}
.wrap{position:relative;z-index:2;width:100%;max-width:560px}
.logo{text-align:center;margin-bottom:15px}
.logo img{
width:min(320px,85%);
animation:glow 3s infinite alternate;
}
@keyframes glow{
0%{filter:drop-shadow(0 0 10px #00aaff) drop-shadow(0 0 20px #00aaff)}
100%{filter:drop-shadow(0 0 10px #ff9900) drop-shadow(0 0 25px #ff9900)}
}
.bigtitle{
color:#fff;
font-size:clamp(24px,5vw,42px);
font-weight:900;
text-align:center;
text-shadow:0 0 20px #ff66ff;
margin:10px 0 20px;
}
.card{
  background:linear-gradient(
    135deg,
    rgba(20,20,40,.75),
    rgba(80,20,120,.45)
  );
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.18);
  border-radius:32px;
  padding:18px;
  margin-bottom:18px;

  box-shadow:
    0 0 20px rgba(0,217,255,.25),
    0 0 40px rgba(139,44,255,.20),
    inset 0 0 20px rgba(255,255,255,.05);
}
.label{
text-align:center;
color:var(--gold);
font-size:22px;
font-weight:bold;
letter-spacing:4px;
margin-bottom:12px;
}
.row{display:flex;gap:8px}
input{
flex:1;height:50px;border-radius:12px;
background:#000;color:#fff;border:1px solid #fff;
padding:12px;font-size:16px;
}
.btn2{
width:110px;border-radius:12px;border:1px solid #fff;
background:#333;color:#fff;font-weight:bold;
}
.wheel-card{text-align:center;position:relative}
.pointer{
position:absolute;left:50%;top:72px;transform:translateX(-50%);
width:0;height:0;
border-left:18px solid transparent;
border-right:18px solid transparent;
border-top:34px solid var(--gold);
z-index:10;
filter:drop-shadow(0 0 10px gold);
}
.wheel-box{
  padding:15px;
  border-radius:30px;

  background:
    radial-gradient(
      circle at center,
      rgba(255,255,255,.18),
      rgba(255,255,255,.04)
    );

  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,.12);

  box-shadow:
    0 0 30px rgba(0,217,255,.25),
    0 0 50px rgba(139,44,255,.20),
    inset 0 0 30px rgba(255,255,255,.08);
}
canvas{
width:100%;
max-width:380px;
transition:transform 6s cubic-bezier(.12,.85,.12,1);
}
#spinBtn{
  margin-top:15px;
  width:100%;
  height:70px;

  border:none;
  border-radius:18px;

  background:linear-gradient(
    90deg,
    #ffe600,
    #ffb300,
    #ff7a00
  );

  color:#111;
  font-weight:900;

  box-shadow:
    0 0 20px #ffd700,
    0 0 40px rgba(255,215,0,.6);

  transition:.25s;
}

#spinBtn:hover{
  transform:translateY(-2px);
}
.popup{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.8);
justify-content:center;align-items:center;
z-index:9999;
}
.popbox{
background:#111;color:#fff;
padding:25px;border-radius:20px;text-align:center;
border:1px solid #fff;
}
.popbox button{
margin-top:15px;padding:10px 25px;border:none;
border-radius:10px;background:gold;font-weight:bold;
}
.note{
text-align:center;color:#ddd;margin-top:10px;font-size:13px
}
</style>
</head>
<body>

<div class="wrap">

<div class="logo">
<!-- GANTI URL LOGO SEKALI SAJA -->
<img src="https://i.ibb.co/pvWVSK4Y/Chat-GPT-Image-Jun-20-2026-02-18-21-AM.png">
<div class="bigtitle">CLAIM SALDONYA SEKARANG JUGA !</div>

<div class="card">
<div class="label">MASUKKAN USERID </div>
<div class="row">
<input id="userid" placeholder="CONTOH: RAGAM01">
<button class="btn2" onclick="userid.value=''">HAPUS</button>
</div>
</div>

<div class="card wheel-card">
<div class="label">FREE SPIN WHEEL </div>
<div class="pointer"></div>

<div class="wheel-box">
<canvas id="wheel" width="400" height="400"></canvas>
</div>

<button id="spinBtn">PUTAR SEKARANG</button>

</div>

</div>

<div class="popup" id="popup">
<div class="popbox">
<div id="msg"></div>
<button onclick="popup.style.display='none'">OK</button>
</div>
</div>

<script>

const hadiah=["10.000","35.000","40.000","50.000","15.000","20.000","30.000","25.000"];
const warna=["#ffd700","#ff7b00","#00d9ff","#8b2cff","#ffd700","#ff7b00","#00d9ff","#8b2cff"];

const API_URL="https://script.google.com/macros/s/AKfycbw99-Zhf8ANVGI5E7cOMQZfCWK4lpYxwYC2-QaHXUjzD2Aw3tfeAfjCEoGqoDx58tje/exec";

const cv=document.getElementById("wheel");
const ctx=cv.getContext("2d");

function draw(){
  let c=200,r=190;

  for(let i=0;i<hadiah.length;i++){

    let a=i*2*Math.PI/hadiah.length;
    let b=(i+1)*2*Math.PI/hadiah.length;

    ctx.beginPath();
    ctx.moveTo(c,c);
    ctx.arc(c,c,r,a,b);
    ctx.fillStyle=warna[i];
    ctx.fill();

    ctx.save();
    ctx.translate(c,c);
    ctx.rotate(a+(b-a)/2);

    ctx.fillStyle="#fff";
    ctx.font="bold 22px Arial";
    ctx.textAlign="center";
    ctx.fillText(hadiah[i],130,5);

    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(c,c,18,0,Math.PI*2);
  ctx.fillStyle="gold";
  ctx.fill();
}

draw();

function pop(t){
  msg.innerText=t;
  popup.style.display="flex";
}

let rot=0;

spinBtn.onclick=async ()=>{

  let id=userid.value.trim();

  if(!id){
    pop("ISI USER ID DAHULU");
    return;
  }
const check = await fetch(API_URL,{
  method:"POST",
  body:JSON.stringify({
    userid:id,
    action:"check"
  })
});

const result = await check.json();

if(result.status === "used"){
  pop("USER ID SUDAH PERNAH MELAKUKAN SPIN");
  return;
}
  spinBtn.disabled=true;
  

  let win = Math.floor(Math.random() * hadiah.length);

const sectorSize = 360 / hadiah.length;

// arahkan ke tengah sektor
let angle = (win * sectorSize) + (sectorSize / 2);

// sesuaikan posisi jarum atas (jam 12)
rot += 3600 - angle - 90;

  cv.style.transform = `rotate(${rot}deg)`;

setTimeout(async ()=>{

  let hasil = hadiah[win];

  spinBtn.innerHTML = "CLAIM " + hasil;

  pop("SELAMAT! KAMU MENDAPATKAN " + hasil);

  spinBtn.disabled = false;

  spinBtn.onclick = ()=>{
    window.location.href="https://ragam4d03.com/";
  };

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      userid:id,
      hadiah:hasil
    })
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.status==="used"){
      pop("USER ID SUDAH PERNAH MELAKUKAN SPIN");
    }
  })
  .catch(console.error);

},6000);
};

function warningMsg(){
    pop("HEY! MAU NGAPAIN KAMU? 😎");
}

// ===== BLOK KLIK KANAN =====
document.addEventListener('keydown', function(e){

    if(e.key === 'F12'){
        e.preventDefault();
        warningMsg();
        return false;
    }

    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i'){
        e.preventDefault();
        warningMsg();
        return false;
    }

    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'j'){
        e.preventDefault();
        warningMsg();
        return false;
    }

    if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'c'){
        e.preventDefault();
        warningMsg();
        return false;
    }

    if(e.ctrlKey && e.key.toLowerCase() === 'u'){
        e.preventDefault();
        warningMsg();
        return false;
    }

    if(e.ctrlKey && e.key.toLowerCase() === 's'){
        e.preventDefault();
        warningMsg();
        return false;
    }

});

// ===== DETEKSI DEVTOOLS =====
setInterval(function(){

    if(
        window.outerWidth - window.innerWidth > 160 ||
        window.outerHeight - window.innerHeight > 160
    ){

        document.body.innerHTML = `
            <div style="
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                background:black;
                color:white;
                font-size:30px;
                font-weight:bold;
            ">
                AKSES DIBLOKIR
            </div>
        `;

    }

},1000);
  // BLOK KLIK KANAN
window.addEventListener('contextmenu', function(e){
    e.preventDefault();
    e.stopPropagation();
    return false;
}, true);

// BLOK DRAG
window.addEventListener('dragstart', function(e){
    e.preventDefault();
}, true);

// BLOK SELECT TEXT
window.addEventListener('selectstart', function(e){
    e.preventDefault();
}, true);

// BLOK COPY
window.addEventListener('copy', function(e){
    e.preventDefault();
}, true);
  console.log("ANTI INSPECT AKTIF");
  
</script>

</body>
</html>
